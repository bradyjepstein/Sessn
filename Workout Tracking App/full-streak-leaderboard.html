<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — Streak Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0a0a;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    :root {
      --accent: #635BFF;
      --accent-light: #8B85FF;
      --accent-glow: rgba(99, 91, 255, 0.35);
      --accent-soft: rgba(99, 91, 255, 0.12);
      --accent-border: rgba(99, 91, 255, 0.25);
      --card-bg: #151515;
      --card-border: rgba(255,255,255,0.06);
      --gold: #FFD93D;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --fire: #FF8C42;
    }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px 0; font-size: 12px; font-weight: 600;
    }
    .status-time { font-size: 15px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    .top-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 8px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; border: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .back-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 1.5px;
    }
    .header-spacer { width: 40px; }

    /* Banner */
    .group-banner {
      margin: 8px 16px 0;
      background: linear-gradient(135deg, rgba(255,140,66,0.12), rgba(255,107,0,0.05));
      border: 1px solid rgba(255,140,66,0.25);
      border-radius: 18px;
      padding: 18px 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .group-banner-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(255,140,66,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .group-banner-info { flex: 1; }
    .group-banner-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 1px;
      background: linear-gradient(135deg, #FFB347, #FF6B00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .group-banner-meta {
      font-size: 11px; color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    /* Time filter */
    .time-filter {
      display: flex;
      margin: 14px 16px 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 3px; gap: 3px;
    }
    .time-tab {
      flex: 1; padding: 8px 0;
      text-align: center; font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.4); cursor: pointer;
      border-radius: 9px; transition: all 0.2s;
      border: none; background: none;
      font-family: 'Barlow', sans-serif;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .time-tab.active {
      background: rgba(255,140,66,0.12);
      color: var(--fire);
      border: 1px solid rgba(255,140,66,0.3);
    }

    /* Full leaderboard list */
    .leaderboard-full {
      margin: 14px 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
    }
    .leader-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .leader-row:last-child { border-bottom: none; }
    .leader-row:hover { background: rgba(255,255,255,0.03); }
    .leader-rank {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .leader-rank.gold { background: rgba(255,217,61,0.15); color: var(--gold); box-shadow: 0 0 12px rgba(255,217,61,0.3); }
    .leader-rank.silver { background: rgba(192,192,192,0.15); color: var(--silver); }
    .leader-rank.bronze { background: rgba(205,127,50,0.15); color: var(--bronze); }
    .leader-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff;
      flex-shrink: 0; border: 2px solid var(--card-border);
    }
    .leader-info { flex: 1; min-width: 0; }
    .leader-name { font-size: 14px; font-weight: 600; }
    .leader-detail { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
    .leader-stat {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 0.5px;
      color: rgba(255,255,255,0.85); flex-shrink: 0;
    }
    .leader-row.you {
      background: rgba(255,140,66,0.08);
      border-top: 1px solid rgba(255,140,66,0.2);
      border-bottom: 1px solid rgba(255,140,66,0.2);
    }
    .leader-row.you .leader-name {
      background: linear-gradient(135deg, #FFB347, #FF6B00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bottom-spacer { height: 120px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 12px 28px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 12px;
    }
    .nav-item svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.35); }
    .nav-item span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .nav-item.active svg { fill: var(--accent-light); }
    .nav-item.active span { color: var(--accent-light); }
    .nav-add {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .nav-add svg { width: 28px; height: 28px; fill: #fff; }
    ::-webkit-scrollbar { width: 0; }
    @media (min-width: 500px) {
      body { border-left: 3px solid rgba(255,255,255,0.08); border-right: 3px solid rgba(255,255,255,0.08); box-shadow: 0 0 80px rgba(0,0,0,0.5); }
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="top-header">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="header-title">STREAK BOARD</div>
    <div class="header-spacer"></div>
  </div>

  <!-- Banner -->
  <div class="group-banner">
    <div class="group-banner-icon">&#128293;</div>
    <div class="group-banner-info">
      <div class="group-banner-name">FRIEND STREAKS</div>
      <div class="group-banner-meta" id="bannerMeta">9 friends &bull; Weekly streak</div>
    </div>
  </div>

  <!-- Current Streak Leaderboard -->
  <div style="padding: 16px 20px 8px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1.2px; color: rgba(255,255,255,0.6);">CURRENT STREAK</div>
  <div class="leaderboard-full" id="currentList"></div>

  <!-- Longest All-Time Streak -->
  <div style="padding: 16px 20px 8px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1.2px; color: rgba(255,255,255,0.6);">LONGEST ALL TIME</div>
  <div class="leaderboard-full" id="alltimeList"></div>

  <div class="bottom-spacer"></div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='home.html'">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="location.href='search.html'">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-add" onclick="location.href='independent post 1.html'">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>
    <div class="nav-item active" onclick="location.href='friends leaderboard.html'">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Community</span>
    </div>
    <div class="nav-item" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profile</span>
    </div>
  </div>

  <script>
    const friends = [
      { name:'bradyepstein', init:'B', grad:'#635BFF,#8B85FF', you:true },
      { name:'lydiakoehler', init:'LK', grad:'#FF6B9D,#C44DFF', you:false },
      { name:'dschwartz42', init:'DS', grad:'#5B8CFF,#5BDB6D', you:false },
      { name:'mikejohnson_', init:'MJ', grad:'#FFB85B,#FF8BA7', you:false },
      { name:'kwilliams23', init:'KW', grad:'#FF6B9D,#635BFF', you:false },
      { name:'arod.fitness', init:'AR', grad:'#5BDB6D,#5BE8D5', you:false },
      { name:'jpark_lifts', init:'JP', grad:'#FFB85B,#5B8CFF', you:false },
      { name:'nrivera.fit', init:'NR', grad:'#E85BFF,#5BE8D5', you:false },
      { name:'tchen99', init:'TC', grad:'#5BDB6D,#FFB85B', you:false },
    ];

    var currentStreak = {
      order: [0,1,2,3,4,5,6,7,8],
      values: ['5 WEEKS','3 WEEKS','3 WEEKS','2 WEEKS','2 WEEKS','1 WEEK','1 WEEK','0','0'],
      details: ['','','','','','','','','']
    };

    var longestStreak = {
      order: [0,2,1,5,3,4,6,7,8],
      values: ['22 WEEKS','18 WEEKS','15 WEEKS','13 WEEKS','13 WEEKS','10 WEEKS','8 WEEKS','4 WEEKS','4 WEEKS'],
      details: ['','','','','','','','','']
    };

    function renderList(targetId, data) {
      var list = document.getElementById(targetId);
      var rankClasses = ['gold','silver','bronze'];
      list.innerHTML = '';

      for (var i = 0; i < data.order.length; i++) {
        var f = friends[data.order[i]];
        var rankClass = i < 3 ? ' ' + rankClasses[i] : '';
        var youClass = f.you ? ' you' : '';
        var displayName = f.you ? f.name + ' (you)' : f.name;

        list.innerHTML += '<div class="leader-row' + youClass + '">' +
          '<div class="leader-rank' + rankClass + '">' + (i+1) + '</div>' +
          '<div class="leader-avatar" style="background:linear-gradient(135deg,' + f.grad + ');">' + f.init + '</div>' +
          '<div class="leader-info"><div class="leader-name">' + displayName + '</div><div class="leader-detail">' + data.details[i] + '</div></div>' +
          '<div class="leader-stat">' + data.values[i] + '</div></div>';
      }
    }

    renderList('currentList', currentStreak);
    renderList('alltimeList', longestStreak);
  </script>

</body>
</html>
