<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — Create Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0a0a;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    :root {
      --accent: #635BFF;
      --accent-light: #8B85FF;
      --accent-glow: rgba(99, 91, 255, 0.35);
      --accent-soft: rgba(99, 91, 255, 0.12);
      --accent-border: rgba(99, 91, 255, 0.25);
      --card-bg: #151515;
      --card-border: rgba(255,255,255,0.06);
    }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px 0; font-size: 12px; font-weight: 600;
    }
    .status-time { font-size: 15px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    .top-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 8px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; border: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .back-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 1.5px;
    }
    .header-spacer { width: 40px; }

    .form-section {
      padding: 20px 16px 0;
    }
    .section-label {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
    }
    .field-group {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .field-group:focus-within { border-color: var(--accent-border); }
    .field-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }
    .field-input {
      width: 100%;
      background: none; border: none; outline: none;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; font-weight: 500; color: #fff;
    }
    .field-input::placeholder { color: rgba(255,255,255,0.2); }

    /* Privacy Toggle */
    .privacy-toggle {
      display: flex; gap: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 14px;
    }
    .privacy-option {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      font-size: 14px; font-weight: 600;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s;
      border: none; background: none;
      font-family: 'Barlow', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .privacy-option svg { width: 20px; height: 20px; fill: currentColor; }
    .privacy-option .priv-desc {
      font-size: 10px; color: rgba(255,255,255,0.25);
      font-weight: 500;
    }
    .privacy-option.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .privacy-option.active .priv-desc { color: rgba(255,255,255,0.7); }

    /* Group Icon Picker */
    .icon-picker {
      display: flex; gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .icon-choice {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .icon-choice:hover { border-color: rgba(255,255,255,0.15); }
    .icon-choice.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* Create button */
    .create-btn-container { padding: 24px 16px 120px; }
    .create-btn {
      width: 100%;
      padding: 14px 0;
      border-radius: 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; font-weight: 700;
      text-align: center;
      cursor: pointer; border: none;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: all 0.2s;
    }
    .create-btn:hover { background: var(--accent-light); }
    .create-btn:active { transform: scale(0.98); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 12px 28px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 12px;
    }
    .nav-item svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.35); }
    .nav-item span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .nav-item.active svg { fill: var(--accent-light); }
    .nav-item.active span { color: var(--accent-light); }
    .nav-add {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .nav-add svg { width: 28px; height: 28px; fill: #fff; }
    ::-webkit-scrollbar { width: 0; }
    @media (min-width: 500px) {
      body { border-left: 3px solid rgba(255,255,255,0.08); border-right: 3px solid rgba(255,255,255,0.08); box-shadow: 0 0 80px rgba(0,0,0,0.5); }
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="top-header">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="header-title">CREATE GROUP</div>
    <div class="header-spacer"></div>
  </div>

  <div class="form-section">

    <div class="section-label">Group Icon</div>
    <div class="icon-picker">
      <div class="icon-choice selected" onclick="pickIcon(this)">&#127947;</div>
      <div class="icon-choice" onclick="pickIcon(this)">&#127939;</div>
      <div class="icon-choice" onclick="pickIcon(this)">&#128293;</div>
      <div class="icon-choice" onclick="pickIcon(this)">&#9889;</div>
      <div class="icon-choice" onclick="pickIcon(this)">&#127942;</div>
      <div class="icon-choice" onclick="pickIcon(this)">🧘</div>
    </div>

    <div class="section-label">Group Name</div>
    <div class="field-group">
      <div class="field-label">Name</div>
      <input class="field-input" type="text" placeholder="e.g. Lift Crew, Morning Grinders...">
    </div>

    <div class="section-label">Description</div>
    <div class="field-group">
      <div class="field-label">About this group</div>
      <textarea class="field-input" rows="3" style="resize:none;font-family:'Barlow',sans-serif;line-height:1.5;" placeholder="What's this group about? Who is it for?"></textarea>
    </div>

    <div class="section-label">Privacy</div>
    <div class="privacy-toggle">
      <button class="privacy-option active" onclick="setPrivacy(this)">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Public
        <span class="priv-desc">Anyone can join</span>
      </button>
      <button class="privacy-option" onclick="setPrivacy(this)">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        Private
        <span class="priv-desc">Approval required</span>
      </button>
    </div>

  </div>

  <div class="create-btn-container">
    <button class="create-btn" onclick="location.href='friends leaderboard.html'">Create Group</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='home.html'">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="location.href='search.html'">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-add" onclick="location.href='independent post 1.html'">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>
    <div class="nav-item active" onclick="location.href='friends leaderboard.html'">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Community</span>
    </div>
    <div class="nav-item" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profile</span>
    </div>
  </div>

  <script>
    function pickIcon(el) {
      document.querySelectorAll('.icon-choice').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
    }
    function setPrivacy(btn) {
      document.querySelectorAll('.privacy-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
