<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sessn — Post</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Barlow', sans-serif; max-width: 430px; margin: 0 auto; }
  :root { --accent: #635BFF; --accent-light: #8B85FF; --accent-glow: rgba(99,91,255,0.35); --accent-soft: rgba(99,91,255,0.12); --accent-border: rgba(99,91,255,0.25); --card-bg: #151515; --card-border: rgba(255,255,255,0.06); }

  .story-frame { width: 100%; height: 100vh; position: relative; overflow: hidden; background: #000; }
  .bg-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7) contrast(1.05); }
  .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.0) 20%, rgba(0,0,0,0.0) 45%, rgba(0,0,0,0.45) 65%, rgba(0,0,0,0.78) 100%); }
  .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 28px 28px 36px; z-index: 2; }

  .top-bar { position: absolute; top: 54px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 3; }
  .back-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .back-btn svg { width: 20px; height: 20px; fill: #fff; }
  .sessn-logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,0.5); }

  .post-user-row { position: absolute; top: 106px; left: 20px; display: flex; align-items: center; gap: 10px; z-index: 3; }
  .post-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #FF6B9D, #C44DFF); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #fff; border: 2px solid rgba(255,255,255,0.2); }
  .post-username { font-size: 12px; font-weight: 700; color: #fff; }
  .post-date { font-size: 10px; color: rgba(255,255,255,0.5); }

  .location { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 14px; margin-bottom: 6px; margin-left: -8px; width: fit-content; }
  .location-pin { width: 11px; height: 11px; }
  .location-text { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.85); letter-spacing: 0.5px; }

  .workout-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: #fff; line-height: 0.95; letter-spacing: 1.5px; margin-bottom: 8px; text-shadow: 0 2px 20px rgba(0,0,0,0.4); }

  /* Class badge */
  .class-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,139,167,0.15); border: 1px solid rgba(255,139,167,0.35); border-radius: 8px; padding: 4px 10px; font-size: 10px; font-weight: 700; color: #FF8BA7; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

  .title-stats-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
  .title-col { flex: 1; display: flex; flex-direction: column; align-items: flex-start; }
  .stat-col { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .stat-item-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; text-align: right; }
  .stat-item-value { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #fff; line-height: 1; letter-spacing: 0.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.5); text-align: right; }
  .stat-item-value span { font-size: 14px; opacity: 0.6; margin-left: 2px; }

  /* Star rating display */
  .star-display { display: flex; gap: 2px; margin-top: 4px; }
  .star-display span { font-size: 14px; }
  .star-display .dim { opacity: 0.3; }

  .bottom-actions { display: flex; align-items: center; gap: 20px; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
  .action-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); cursor: pointer; background: none; border: none; font-family: 'Barlow', sans-serif; transition: color 0.2s; }
  .action-btn:hover { color: #fff; }
  .action-btn svg { width: 22px; height: 22px; fill: currentColor; }
  .action-btn.liked { color: #FF4D6A; }
  .action-btn.liked svg { fill: #FF4D6A; }
  .action-spacer { flex: 1; }
  .save-btn { display: flex; align-items: center; gap: 6px; font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 10px; padding: 8px 16px; cursor: pointer; box-shadow: 0 2px 12px var(--accent-glow); transition: background 0.2s, transform 0.15s; }
  .save-btn:hover { background: var(--accent-light); }
  .save-btn:active { transform: scale(0.96); }
  .save-btn svg { width: 14px; height: 14px; fill: #fff; }

  /* Description preview */
  .class-desc-preview { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.4; margin-top: 6px; max-width: 220px; }

  @media (min-width: 500px) { body { border-left: 3px solid rgba(255,255,255,0.08); border-right: 3px solid rgba(255,255,255,0.08); box-shadow: 0 0 80px rgba(0,0,0,0.5); } }
</style>
</head>
<body>

<div class="story-frame">
  <img class="bg-photo" src="Images/lydia-class.png" alt="CrossFit Class" style="object-position: center 25%;" />
  <div class="overlay"></div>

  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="sessn-logo">SESSN</div>
  </div>

  <div class="post-user-row">
    <div class="post-avatar">LK</div>
    <div>
      <div class="post-username">lydiakoehler</div>
      <div class="post-date">4/10/26</div>
    </div>
  </div>

  <div class="content">

    <div class="title-stats-row">
      <div class="title-col">
        <div class="location">
          <svg class="location-pin" viewBox="0 0 16 16" fill="none">
            <path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 7a2 2 0 110-4 2 2 0 010 4z" fill="rgba(255,255,255,0.85)"/>
          </svg>
          <span class="location-text">CrossFit Reno</span>
        </div>
        <div class="class-badge">&#128293; Class</div>
        <div class="workout-title">Saturday<br/>CrossFit WOD</div>
        <div class="class-desc-preview">AMRAP 20 min — wall balls, box jumps, kettlebell swings, burpees.</div>
      </div>

      <div class="stat-col">
        <div>
          <div class="stat-item-label">Class Type</div>
          <div class="stat-item-value">CrossFit</div>
        </div>
        <div>
          <div class="stat-item-label">Time</div>
          <div class="stat-item-value">60<span>MIN</span></div>
        </div>
        <div>
          <div class="stat-item-label">Rating</div>
          <div class="star-display">
            <span>&#11088;</span><span>&#11088;</span><span>&#11088;</span><span>&#11088;</span><span class="dim">&#11088;</span>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="action-btn liked" onclick="toggleLike(this)">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span>42</span>
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        <span>12</span>
      </button>
      <button class="action-btn" onclick="location.href='share home.html'">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <div class="action-spacer"></div>
      <button class="save-btn">
        <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
        Save
      </button>
    </div>

  </div>
</div>

<script>
  function toggleLike(btn) {
    btn.classList.toggle('liked');
    var span = btn.querySelector('span');
    var count = parseInt(span.textContent);
    span.textContent = btn.classList.contains('liked') ? count + 1 : count - 1;
  }
</script>

</body>
</html>
