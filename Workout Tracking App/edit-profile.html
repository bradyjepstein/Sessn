<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — Edit Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: 'Barlow', sans-serif; background: #0a0a0a; color: #fff; -webkit-font-smoothing: antialiased; max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; overflow-x: hidden; }
    :root { --accent: #635BFF; --accent-light: #8B85FF; --accent-glow: rgba(99,91,255,0.35); --accent-soft: rgba(99,91,255,0.12); --accent-border: rgba(99,91,255,0.25); --card-bg: #151515; --card-border: rgba(255,255,255,0.06); }

    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px 0; font-size: 12px; font-weight: 600; }
    .status-time { font-size: 15px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    .top-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; border: none; }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .back-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1.5px; }
    .save-header-btn { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent-light); background: none; border: none; cursor: pointer; padding: 8px 0; }
    .save-header-btn:hover { color: #fff; }

    /* Profile pic editor */
    .pfp-section { display: flex; flex-direction: column; align-items: center; padding: 24px 0 20px; }
    .pfp-edit-wrap { position: relative; cursor: pointer; }
    .pfp-circle {
      width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: 1px; color: #fff;
      border: 3px solid var(--accent-border);
      box-shadow: 0 4px 24px var(--accent-glow);
    }
    .pfp-camera {
      position: absolute; bottom: 0; right: 0;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      border: 3px solid #0a0a0a;
    }
    .pfp-camera svg { width: 14px; height: 14px; fill: #fff; }
    .pfp-change-text { font-size: 12px; color: var(--accent-light); font-weight: 600; margin-top: 10px; cursor: pointer; }

    /* Form fields */
    .form-section { padding: 0 16px; }
    .section-label { padding: 8px 4px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); }
    .field-group {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .field-group:focus-within { border-color: var(--accent-border); }
    .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
    .field-input {
      width: 100%; background: none; border: none; outline: none;
      font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 500; color: #fff;
    }
    .field-input::placeholder { color: rgba(255,255,255,0.2); }
    .field-textarea {
      width: 100%; background: none; border: none; outline: none;
      font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; color: #fff;
      resize: none; min-height: 60px; line-height: 1.5;
    }
    .field-textarea::placeholder { color: rgba(255,255,255,0.2); }
    .char-count { text-align: right; font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 4px; }

    /* Gender / Fitness Level */
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .pill-option {
      padding: 8px 16px; border-radius: 10px;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      color: rgba(255,255,255,0.5);
      cursor: pointer; transition: all 0.2s;
    }
    .pill-option:hover { border-color: rgba(255,255,255,0.15); }
    .pill-option.selected {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent-light);
    }

    /* Link fields */
    .link-field {
      display: flex; align-items: center; gap: 10px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .link-field:focus-within { border-color: var(--accent-border); }
    .link-prefix { font-size: 13px; color: rgba(255,255,255,0.3); font-weight: 600; flex-shrink: 0; }
    .link-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; color: #fff;
    }
    .link-input::placeholder { color: rgba(255,255,255,0.2); }

    /* Save button */
    .save-btn-container { padding: 20px 16px 120px; }
    .save-btn {
      width: 100%; padding: 14px 0; border-radius: 14px;
      font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 700;
      text-align: center; cursor: pointer; border: none;
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: all 0.2s;
    }
    .save-btn:hover { background: var(--accent-light); }
    .save-btn:active { transform: scale(0.98); }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(10,10,10,0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-around; padding: 8px 12px 28px; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 12px; }
    .nav-item svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.35); }
    .nav-item span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .nav-item.active svg { fill: var(--accent-light); }
    .nav-item.active span { color: var(--accent-light); }
    .nav-add { width: 56px; height: 56px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; margin-top: -24px; cursor: pointer; box-shadow: 0 4px 20px var(--accent-glow); }
    .nav-add svg { width: 28px; height: 28px; fill: #fff; }
    ::-webkit-scrollbar { width: 0; }
    @media (min-width: 500px) { body { border-left: 3px solid rgba(255,255,255,0.08); border-right: 3px solid rgba(255,255,255,0.08); box-shadow: 0 0 80px rgba(0,0,0,0.5); } }
  </style>
</head>
<body>

  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="top-header">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="header-title">EDIT PROFILE</div>
    <button class="save-header-btn" onclick="location.href='profile.html'">Save</button>
  </div>

  <!-- Profile Picture -->
  <div class="pfp-section">
    <div class="pfp-edit-wrap">
      <div class="pfp-circle">BE</div>
      <div class="pfp-camera">
        <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      </div>
    </div>
    <div class="pfp-change-text">Change Profile Photo</div>
  </div>

  <div class="form-section">

    <!-- Basic Info -->
    <div class="section-label">Basic Info</div>

    <div class="field-group">
      <div class="field-label">Name</div>
      <input class="field-input" type="text" value="Brady Epstein">
    </div>

    <div class="field-group">
      <div class="field-label">Username</div>
      <input class="field-input" type="text" value="bradyepstein">
    </div>

    <div class="field-group">
      <div class="field-label">Bio</div>
      <textarea class="field-textarea" maxlength="150">Gym rat. No days off. Tracking every sessn.</textarea>
      <div class="char-count">43/150</div>
    </div>

    <!-- Contact -->
    <div class="section-label" style="margin-top: 8px;">Contact</div>

    <div class="field-group">
      <div class="field-label">Email</div>
      <input class="field-input" type="email" value="brady@email.com">
    </div>

    <div class="field-group">
      <div class="field-label">Phone</div>
      <input class="field-input" type="tel" value="+1 (775) 555-1234">
    </div>

    <!-- Fitness Info -->
    <div class="section-label" style="margin-top: 8px;">Fitness</div>

    <div class="field-group">
      <div class="field-label">Fitness Level</div>
    </div>
    <div class="pill-row">
      <div class="pill-option" onclick="selectPill(this, 'level')">Beginner</div>
      <div class="pill-option selected" onclick="selectPill(this, 'level')">Intermediate</div>
      <div class="pill-option" onclick="selectPill(this, 'level')">Advanced</div>
    </div>

    <div class="field-group">
      <div class="field-label">Primary Split</div>
      <input class="field-input" type="text" value="Push Pull Legs" placeholder="e.g. PPL, Upper/Lower, Bro Split...">
    </div>

    <div class="field-group">
      <div class="field-label">Home Gym</div>
      <input class="field-input" type="text" value="Nic Rec Center" placeholder="Where do you usually work out?">
    </div>

    <!-- Social Links -->
    <div class="section-label" style="margin-top: 8px;">Social Links</div>

    <div class="link-field">
      <div class="link-prefix">instagram.com/</div>
      <input class="link-input" type="text" value="bradyepstein" placeholder="username">
    </div>

    <div class="link-field">
      <div class="link-prefix">twitter.com/</div>
      <input class="link-input" type="text" placeholder="username">
    </div>

    <!-- Gender -->
    <div class="section-label" style="margin-top: 8px;">Gender</div>
    <div class="pill-row">
      <div class="pill-option selected" onclick="selectPill(this, 'gender')">Male</div>
      <div class="pill-option" onclick="selectPill(this, 'gender')">Female</div>
      <div class="pill-option" onclick="selectPill(this, 'gender')">Other</div>
      <div class="pill-option" onclick="selectPill(this, 'gender')">Prefer not to say</div>
    </div>

  </div>

  <!-- Save Button -->
  <div class="save-btn-container">
    <button class="save-btn" onclick="location.href='profile.html'">Save Changes</button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='home.html'">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="location.href='search.html'">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-add" onclick="location.href='independent post 1.html'">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>
    <div class="nav-item" onclick="location.href='friends leaderboard.html'">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Community</span>
    </div>
    <div class="nav-item active" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profile</span>
    </div>
  </div>

  <script>
    function selectPill(el, group) {
      var parent = el.parentElement;
      parent.querySelectorAll('.pill-option').forEach(function(p) { p.classList.remove('selected'); });
      el.classList.add('selected');
    }

    // Live char count for bio
    var bio = document.querySelector('.field-textarea');
    var counter = document.querySelector('.char-count');
    if (bio && counter) {
      bio.addEventListener('input', function() {
        counter.textContent = bio.value.length + '/150';
      });
    }
  </script>

</body>
</html>
