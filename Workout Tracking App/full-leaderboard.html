<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — Full Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0a0a;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    :root {
      --accent: #635BFF;
      --accent-light: #8B85FF;
      --accent-glow: rgba(99, 91, 255, 0.35);
      --accent-soft: rgba(99, 91, 255, 0.12);
      --accent-border: rgba(99, 91, 255, 0.25);
      --card-bg: #151515;
      --card-border: rgba(255,255,255,0.06);
      --gold: #FFD93D;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px 0; font-size: 12px; font-weight: 600;
    }
    .status-time { font-size: 15px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    .top-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 8px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; border: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .back-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 1.5px;
    }
    .dots-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; border: none;
    }
    .dots-btn:hover { background: rgba(255,255,255,0.1); }
    .dots-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }

    /* Group Banner */
    .group-banner {
      margin: 8px 16px 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 18px 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .group-banner-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(91,140,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .group-banner-info { flex: 1; }
    .group-banner-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 1px;
    }
    .group-banner-meta {
      font-size: 11px; color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    /* Metric filter */
    .metric-filter {
      display: flex;
      margin: 14px 16px 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 3px; gap: 3px;
    }
    .metric-tab {
      flex: 1; padding: 8px 0;
      text-align: center; font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.4); cursor: pointer;
      border-radius: 9px; transition: all 0.2s;
      border: none; background: none;
      font-family: 'Barlow', sans-serif;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .metric-tab.active {
      background: var(--accent-soft);
      color: var(--accent-light);
      border: 1px solid var(--accent-border);
    }

    /* Time filter */
    .time-filter {
      display: flex;
      margin: 8px 16px 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 3px; gap: 3px;
    }
    .time-tab {
      flex: 1; padding: 8px 0;
      text-align: center; font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.4); cursor: pointer;
      border-radius: 9px; transition: all 0.2s;
      border: none; background: none;
      font-family: 'Barlow', sans-serif;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .time-tab.active {
      background: var(--accent-soft);
      color: var(--accent-light);
      border: 1px solid var(--accent-border);
    }

    /* Full leaderboard list */
    .leaderboard-full {
      margin: 14px 16px 120px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
    }
    .leader-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .leader-row:last-child { border-bottom: none; }
    .leader-row:hover { background: rgba(255,255,255,0.03); }
    .leader-rank {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .leader-rank.gold { background: rgba(255,217,61,0.15); color: var(--gold); box-shadow: 0 0 12px rgba(255,217,61,0.3); }
    .leader-rank.silver { background: rgba(192,192,192,0.15); color: var(--silver); }
    .leader-rank.bronze { background: rgba(205,127,50,0.15); color: var(--bronze); }
    .leader-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff;
      flex-shrink: 0; border: 2px solid var(--card-border);
    }
    .leader-info { flex: 1; min-width: 0; }
    .leader-name { font-size: 14px; font-weight: 600; }
    .leader-detail { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
    .leader-stat {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 0.5px;
      color: rgba(255,255,255,0.85); flex-shrink: 0;
    }
    .leader-stat span { font-size: 11px; opacity: 0.5; font-family: 'Barlow', sans-serif; font-weight: 600; margin-left: 2px; }
    .leader-row.you {
      background: var(--accent-soft);
      border-top: 1px solid var(--accent-border);
      border-bottom: 1px solid var(--accent-border);
    }
    .leader-row.you .leader-name { color: var(--accent-light); }

    /* 3-dot menu popup */
    .menu-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 500; display: none;
    }
    .menu-backdrop.visible { display: block; }
    .menu-panel {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px;
      background: #1a1a1a;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      z-index: 600;
      padding: 0 20px 36px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
    }
    .menu-panel.visible { transform: translateX(-50%) translateY(0); }
    .menu-handle {
      display: flex; justify-content: center; padding: 12px 0 16px;
    }
    .menu-handle div {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }
    .menu-option {
      width: 100%;
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      transition: all 0.2s;
    }
    .menu-option:hover { border-color: var(--accent-border); }
    .menu-option:active { transform: scale(0.98); }
    .menu-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .menu-icon svg { width: 20px; height: 20px; fill: #fff; }
    .menu-icon.invite { background: var(--accent-soft); }
    .menu-icon.invite svg { fill: var(--accent-light); }
    .menu-icon.leave { background: rgba(255,77,106,0.12); }
    .menu-icon.leave svg { fill: #FF4D6A; }
    .menu-label { flex: 1; font-size: 15px; font-weight: 600; color: #fff; }
    .menu-option.danger .menu-label { color: #FF4D6A; }
    .menu-chevron svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.2); }

    .menu-cancel {
      width: 100%;
      padding: 14px 0;
      margin-top: 4px;
      background: rgba(255,255,255,0.06);
      border: none; border-radius: 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; font-weight: 700;
      color: #fff; cursor: pointer;
    }
    .menu-cancel:hover { background: rgba(255,255,255,0.1); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 12px 28px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 12px;
    }
    .nav-item svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.35); }
    .nav-item span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .nav-item.active svg { fill: var(--accent-light); }
    .nav-item.active span { color: var(--accent-light); }
    .nav-add {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .nav-add svg { width: 28px; height: 28px; fill: #fff; }
    ::-webkit-scrollbar { width: 0; }
    @media (min-width: 500px) {
      body { border-left: 3px solid rgba(255,255,255,0.08); border-right: 3px solid rgba(255,255,255,0.08); box-shadow: 0 0 80px rgba(0,0,0,0.5); }
    }
  </style>
</head>

      { name:'lydiakoehler', init:'LK', grad:'#FF6B9D,#C44DFF', you:false, streak:'3 WEEKS', detail:'3 week streak' },
      { name:'dschwartz42', init:'DS', grad:'#5B8CFF,#5BDB6D', you:false, streak:'3 WEEKS', detail:'3 week streak' },
      { name:'mikejohnson_', init:'MJ', grad:'#FFB85B,#FF8BA7', you:false, streak:'2 WEEKS', detail:'2 week streak' },
      { name:'kwilliams23', init:'KW', grad:'#FF6B9D,#635BFF', you:false, streak:'2 WEEKS', detail:'2 week streak' },
      { name:'arod.fitness', init:'AR', grad:'#5BDB6D,#5BE8D5', you:false, streak:'1 WEEK', detail:'1 week streak' },
      { name:'jpark_lifts', init:'JP', grad:'#FFB85B,#5B8CFF', you:false, streak:'1 WEEK', detail:'1 week streak' },
      { name:'nrivera.fit', init:'NR', grad:'#E85BFF,#5BE8D5', you:false, streak:'0', detail:'No active streak' },
      { name:'tchen99', init:'TC', grad:'#5BDB6D,#FFB85B', you:false, streak:'0', detail:'No active streak' },
    ];

    let currentMetric = 'sessns';
    let currentTime = 'monthly';
    const timeLabels = { weekly:'Weekly', monthly:'Monthly', alltime:'All Time' };

    function renderLeaderboard() {
      const metric = allData[currentMetric];
      const period = metric[currentTime];
      const list = document.getElementById('leaderboardList');
      const rankClasses = ['gold','silver','bronze'];
      list.innerHTML = '';

      for (let i = 0; i < period.order.length; i++) {
        const m = members[period.order[i]];
        const rankClass = i < 3 ? ' ' + rankClasses[i] : '';
        const youClass = m.you ? ' you' : '';
        const displayName = m.you ? m.name + ' (you)' : m.name;

        list.innerHTML += '<div class="leader-row' + youClass + '">' +
          '<div class="leader-rank' + rankClass + '">' + (i+1) + '</div>' +
          '<div class="leader-avatar" style="background:linear-gradient(135deg,' + m.grad + ');">' + m.init + '</div>' +
          '<div class="leader-info"><div class="leader-name">' + displayName + '</div><div class="leader-detail"></div></div>' +
          '<div class="leader-stat">' + period.values[i] + ' <span>' + metric.unit + '</span></div></div>';
      }

      document.getElementById('bannerMeta').textContent = '12 members \u2022 ' + metric.label + ' \u2022 ' + timeLabels[currentTime];
    }

    function renderStreakBoard() {
      const list = document.getElementById('streakList');
      const rankClasses = ['gold','silver','bronze'];
      list.innerHTML = '';

      for (let i = 0; i < streakFriends.length; i++) {
        const f = streakFriends[i];
        const rankClass = i < 3 ? ' ' + rankClasses[i] : '';
        const youClass = f.you ? ' you' : '';
        const displayName = f.you ? f.name + ' (you)' : f.name;

        list.innerHTML += '<div class="leader-row' + youClass + '">' +
          '<div class="leader-rank' + rankClass + '">' + (i+1) + '</div>' +
          '<div class="leader-avatar" style="background:linear-gradient(135deg,' + f.grad + ');">' + f.init + '</div>' +
          '<div class="leader-info"><div class="leader-name">' + displayName + '</div><div class="leader-detail"></div></div>' +
          '<div class="leader-stat">' + f.streak + '</div></div>';
      }
    }

    function setMetric(metric, btn) {
      currentMetric = metric;
      document.querySelectorAll('.metric-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderLeaderboard();
    }

    function setTime(btn) {
      const text = btn.textContent.trim().toLowerCase().replace(' ','');
      currentTime = text === 'alltime' ? 'alltime' : text;
      document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderLeaderboard();
    }

    function openMenu() {
      document.querySelector('.menu-backdrop').classList.add('visible');
      document.getElementById('menuPanel').classList.add('visible');
    }
    function closeMenu() {
      document.querySelector('.menu-backdrop').classList.remove('visible');
      document.getElementById('menuPanel').classList.remove('visible');
    }
    function leaveGroup() {
      closeMenu();
      setTimeout(function(){ location.href = 'friends leaderboard.html'; }, 300);
    }

    // Initial render
    renderLeaderboard();
    renderStreakBoard();
  </script>

</body>
</html>
